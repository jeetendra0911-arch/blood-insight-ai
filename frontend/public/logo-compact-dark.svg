<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background for Dark Mode -->
  <rect width="100%" height="100%" fill="#0F172A"/>

  <!-- Top: Centered Integrated Document Icon (Scale 1.0) -->
  <g transform="translate(144, 40)">
    <!-- Document Card Outline with Top-Right Fold (Dark slate card fill) -->
    <path d="M 96 128 C 96 92.65, 124.65 64, 160 64 H 320 L 416 160 V 384 C 416 419.35, 387.35 448, 352 448 H 160 C 124.65 448, 96 419.35, 96 384 Z" 
          fill="#1E293B" stroke="#3B82F6" stroke-width="16" stroke-linejoin="round"/>
    
    <!-- Folder Flap/Crease -->
    <path d="M 320 64 V 136 C 320 149.25, 330.75 160, 344 160 H 416" 
          fill="#1E293B" stroke="#3B82F6" stroke-width="16" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Horizontal Document Lines -->
    <g stroke="#475569" stroke-width="12" stroke-linecap="round">
      <path d="M 144 180 H 192"/> <path d="M 320 180 H 368"/>
      <path d="M 144 213 H 182"/> <path d="M 330 213 H 368"/>
      <path d="M 144 246 H 208"/> <path d="M 304 246 H 368"/>
      <path d="M 144 280 H 176"/> <path d="M 336 280 H 368"/>
      <path d="M 144 313 H 208"/> <path d="M 304 313 H 368"/>
      <path d="M 144 346 H 182"/> <path d="M 330 346 H 368"/>
      <path d="M 144 380 H 192"/> <path d="M 320 380 H 368"/>
    </g>

    <!-- DNA Rungs -->
    <g stroke="#334155" stroke-width="6" stroke-linecap="round">
      <line x1="216" y1="180" x2="296" y2="180"/>
      <line x1="226" y1="213" x2="286" y2="213"/>
      <line x1="246" y1="246" x2="266" y2="246"/>
      <line x1="296" y1="280" x2="216" y2="280"/>
      <line x1="266" y1="313" x2="246" y2="313"/>
      <line x1="286" y1="346" x2="226" y2="346"/>
      <line x1="216" y1="380" x2="296" y2="380"/>
    </g>

    <!-- DNA Left Strand (Blue) -->
    <path d="M 216 180 C 216 230, 296 230, 296 280 C 296 330, 216 330, 216 380" 
          fill="none" stroke="#3B82F6" stroke-width="14" stroke-linecap="round"/>

    <!-- DNA Right Strand (Red) -->
    <path d="M 296 180 C 296 230, 216 230, 216 280 C 216 330, 296 330, 296 380" 
          fill="none" stroke="#EF4444" stroke-width="14" stroke-linecap="round"/>

    <!-- Node Endpoints -->
    <circle cx="216" cy="180" r="7" fill="#3B82F6"/>
    <circle cx="296" cy="180" r="7" fill="#EF4444"/>
    <circle cx="216" cy="380" r="7" fill="#3B82F6"/>
    <circle cx="296" cy="380" r="7" fill="#EF4444"/>
  </g>

  <!-- Bottom: Centered Bold Typography (Dark Mode compatible) -->
  <text x="400" y="590" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="85" font-weight="900" fill="#FFFFFF" letter-spacing="-2">Blood Report</text>
  <text x="400" y="685" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="85" font-weight="900" fill="#3B82F6" letter-spacing="-2">Analyzer <tspan fill="#EF4444">AI</tspan></text>
  <text x="400" y="740" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#94A3B8" letter-spacing="6">HEALTH INTELLIGENCE</text>
</svg>
