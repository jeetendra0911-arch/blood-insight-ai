databases:
  - name: blood-ai-db
    plan: free
    databaseName: blood_analyzer
    user: blood_ai_user

services:
  - type: web
    name: blood-insight-ai-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blood-ai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
